<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fitness">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
body {
  margin:0;
  font-family:-apple-system, system-ui;
  background:#0f172a;
  color:white;
}

.page { display:none; padding:20px; }
.page.active { display:block; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111827;
}

.nav button {
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:#9ca3af;
}

.nav button.active { color:white; }

/* Tabs */
.tabs {
  display:flex;
  gap:8px;
  margin-bottom:20px;
}

.tabs button {
  flex:1;
  padding:10px;
  border:none;
  background:#1f2937;
  color:white;
  border-radius:8px;
}

.tabs button.active { background:#2563eb; }

.tab-content { display:none; }

/* PUSHUP DIAL */
.dial-wrap {
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:30px;
}

.dial {
  width:200px;
  height:200px;
  border-radius:50%;
  border:8px solid #1f2937;
  position:relative;
  touch-action:none;
}

.progress-ring {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  background:conic-gradient(#22c55e 0deg, #1f2937 0deg);
}

.center-number {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
}

.controls {
  display:flex;
  gap:20px;
  margin-top:20px;
}

.controls button {
  font-size:22px;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

.slider {
  width:100%;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
  <h2>Weekly Schedule</h2>
  <ul>
    <li>Day 1 Yoga into Swim - technique</li>
    <li>Day 2 Push</li>
    <li>Day 3 Pull</li>
    <li>Day 4 Leg</li>
    <li>Day 5 Swim endurance</li>
    <li>Day 6 Push or Pull</li>
    <li>Day 7 Long Walk / Optional Swim</li>
  </ul>
</div>

<!-- GYM -->
<div id="gym" class="page">
  <div class="tabs">
    <button onclick="showTab('push')" id="tab-push">Push</button>
    <button onclick="showTab('pull')" id="tab-pull">Pull</button>
    <button onclick="showTab('legs')" id="tab-legs">Legs</button>
    <button onclick="showTab('pushups')" id="tab-pushups">Push-ups</button>
  </div>

  <div id="push" class="tab-content">Push workout</div>
  <div id="pull" class="tab-content">Pull workout</div>
  <div id="legs" class="tab-content">Leg workout</div>

  <!-- PUSHUPS -->
  <div id="pushups" class="tab-content">
    <div class="dial-wrap">
      <div class="dial" id="dial">
        <div class="progress-ring" id="ring"></div>
        <div class="center-number" id="count">0</div>
      </div>

      <div class="controls">
        <button onclick="change(-1)">-</button>
        <button onclick="change(1)">+</button>
      </div>

      <input type="range" min="0" max="100" id="slider" class="slider">
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showPage('home')" id="nav-home" class="active">Home</button>
  <button onclick="showPage('gym')" id="nav-gym">Gym</button>
</div>

<script>
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
}

function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.getElementById(tab).style.display='block';

  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

/* PUSHUP LOGIC */
let slider = document.getElementById('slider');
let count = document.getElementById('count');
let ring = document.getElementById('ring');

function update(val){
  count.innerText = val;
  slider.value = val;

  let deg = (val/100)*360;
  ring.style.background = `conic-gradient(#22c55e ${deg}deg, #1f2937 ${deg}deg)`;

  localStorage.setItem("pushups", val);
}

slider.oninput = () => update(slider.value);

function change(v){
  let newVal = Math.max(0, Math.min(100, Number(slider.value)+v));
  update(newVal);
}

/* DRAG DIAL */
let dial = document.getElementById("dial");

dial.addEventListener("touchmove", (e)=>{
  let rect = dial.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left - rect.width/2;
  let y = e.touches[0].clientY - rect.top - rect.height/2;

  let angle = Math.atan2(y, x) * 180/Math.PI + 180;
  let val = Math.round((angle/360)*100);
  update(val);
});

/* INIT */
let saved = localStorage.getItem("pushups") || 0;
update(saved);
showTab('push');
</script>

</body>
</html>
